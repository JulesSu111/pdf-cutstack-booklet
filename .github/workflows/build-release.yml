name: Build Windows EXE and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name "PDF-CutStack-Booklet" --paths src gui_main.py

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/PDF-CutStack-Booklet/* -DestinationPath PDF-CutStack-Booklet-windows.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-CutStack-Booklet-windows
          path: PDF-CutStack-Booklet-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF-CutStack-Booklet-windows.zip
          generate_release_notes: true